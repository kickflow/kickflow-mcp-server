name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24, 25]
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node-version }}
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Format & Lint & Type check
        run: vp check

      - name: Build
        run: vp build

      - name: Test
        run: vp test
